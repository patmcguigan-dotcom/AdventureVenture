<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amber Dungeons v10.0</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --bg: #050300; --white: #ffffff; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'VT323', monospace; color: var(--amber); touch-action: none; text-transform: uppercase; }
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 500; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 4px solid var(--amber); box-sizing: border-box; text-align: center; }
        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 500px; background: var(--bg); border: 4px double var(--amber); padding: 20px; z-index: 300; display: none; flex-direction: column; align-items: center; }
        .btn { background: var(--bg); border: 2px solid var(--amber); color: var(--amber); padding: 12px 20px; cursor: pointer; font-family: 'VT323'; font-size: 1.3rem; margin: 5px; }
        #status-bar { position: fixed; top: 0; width: 100%; height: 50px; background: var(--amber); color: var(--bg); display: flex; justify-content: space-around; align-items: center; font-weight: bold; z-index: 20; }
        .scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; pointer-events: none; z-index: 600; }
    </style>
</head>
<body>

    <div id="splash-screen" class="overlay">
        <h1>ALISTAIR'S QUEST</h1>
        <p>LEVEL 1: THE AMBER DEPTHS</p>
        <button class="btn" onclick="startGame()">Venture Forth</button>
    </div>

    <div id="encounter-overlay" class="popup">
        <h2 id="foe-name">FOE</h2>
        <div id="combat-log">> READY...</div>
        <button class="btn" onclick="resolveCombat('ATTACK')">[A]TTACK</button>
        <button class="btn" onclick="resolveCombat('ESCAPE')">[E]SCAPE</button>
    </div>

    <div id="status-bar">
        <div>HP: [<span id="hp-bar">||||||||||||||||||||</span>]</div>
        <div>LVL: <span id="lvl-val">1</span> | ATK: +<span id="atk-val">4</span></div>
    </div>

    <div class="scanlines"></div>
    <div id="game-container"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- STATE & CONFIG ---
        let hp = 20, str = 4, weaponBonus = 0, currentLevel = 1, gameState = 'SPLASH';
        let walls = new Set(), entities = [], currentEnemy = null, doorMesh = null;
        const AMBER = 0xffb000;

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-8, 8, 4.5, -4.5, 0.1, 1000); camera.position.z = 10;
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);
        const worldGroup = new THREE.Group(); const targetWorldPos = new THREE.Vector3(0, 0, 0); scene.add(worldGroup);

        // Player Icon (Stayed Centered)
        const playerIcon = new THREE.Mesh(new THREE.OctahedronGeometry(0.3), new THREE.MeshBasicMaterial({ color: AMBER, wireframe: true }));
        playerIcon.position.z = 2; scene.add(playerIcon);

        // --- PIXEL ART GENERATOR (For Level 2) ---
        function createPixelTexture(colors) {
            const canvas = document.createElement('canvas'); canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            colors.forEach((c, i) => {
                ctx.fillStyle = c;
                ctx.fillRect((i % 16), Math.floor(i / 16), 1, 1);
            });
            const tex = new THREE.CanvasTexture(canvas); tex.magFilter = THREE.NearestFilter; return tex;
        }

        // --- LEVEL INITIALIZATION ---
        function initLevel(num) {
            walls.clear(); entities.forEach(e => worldGroup.remove(e)); entities = [];
            worldGroup.position.set(0, 0, 0); targetWorldPos.set(0, 0, 0);

            if (num === 1) {
                // BOUNDARY: x[-15,15], y[-10,15]
                for (let x = -15; x <= 15; x++) { walls.add(`${x},-10`); walls.add(`${x},15`); }
                for (let y = -10; y <= 15; y++) { walls.add(`-15,${y}`); walls.add(`15,${y}`); }
                
                // THRONE ROOM: (10,10)
                for (let x = 8; x <= 12; x++) { walls.add(`${x},8`); walls.add(`${x},12`); }
                walls.add("8,9"); walls.add("8,11"); // Entrance at (8,10)
                
                // SWORD ROOM: (-10, -5)
                for (let x = -12; x <= -8; x++) { walls.add(`${x},-3`); walls.add(`${x},-7`); }
                
                buildWalls(0x442200);
                spawn(1, 0, 'NPC', 'GUARD');
                spawn(-10, -5, 'SWORD', 'CLAYMORE');
                spawn(10, 10, 'BOSS', 'GOBLIN_KING', 18, 30);
                // 4 Goblins
                [[3,3], [-5,5], [8,-2], [-8,8]].forEach(p => spawn(p[0], p[1], 'ENEMY', 'GOBLIN', 10, 5));
                
                // Level 2 Door (Hidden)
                spawn(10, 5, 'DOOR', 'PORTAL');
            } else {
                // LEVEL 2: 16-Bit Style Rework
                playerIcon.material.color.set(0xffffff); // Hero turns white/detailed
                document.body.style.background = "#1a1a2e";
                buildLevel2Styles();
            }
            renderWalls();
        }

        function buildWalls(color) {
            walls.forEach(coord => {
                const [x, y] = coord.split(',').map(Number);
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.95, 0.5), new THREE.MeshBasicMaterial({ color, wireframe: true }));
                mesh.position.set(x, y, 0.2); worldGroup.add(mesh);
            });
        }

        function spawn(x, y, type, name, ac, hp_val) {
            let mesh;
            if(type === 'DOOR') {
                mesh = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.1), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true }));
                mesh.visible = false; doorMesh = mesh;
            } else if(type === 'BOSS') {
                mesh = new THREE.Mesh(new THREE.TorusKnotGeometry(0.4, 0.1), new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true }));
            } else {
                mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.35), new THREE.MeshBasicMaterial({ color: AMBER, wireframe: true }));
            }
            mesh.position.set(x, y, 0.3); mesh.userData = { type, name, ac, health: hp_val, active: true };
            worldGroup.add(mesh); entities.push(mesh);
        }

        // --- ENGINE LOGIC ---
        window.startGame = () => { gameState = 'RUNNING'; document.getElementById('splash-screen').style.display = 'none'; initLevel(1); };

        function move(dx, dy) {
            if (gameState !== 'RUNNING') return;
            const nx = Math.round(-targetWorldPos.x + dx);
            const ny = Math.round(-targetWorldPos.y + dy);
            if (walls.has(`${nx},${ny}`)) return; // Boundary/Wall block
            targetWorldPos.x -= dx; targetWorldPos.y -= dy;
            checkInteractions(nx, ny);
        }

        function checkInteractions(px, py) {
            entities.forEach(e => {
                if (!e.userData.active && e.userData.type !== 'DOOR') return;
                if (e.position.x === px && e.position.y === py) {
                    if (e.userData.type === 'BOSS') triggerEncounter(e);
                    else if (e.userData.type === 'ENEMY') triggerEncounter(e);
                    else if (e.userData.type === 'SWORD') { e.visible = false; e.userData.active = false; weaponBonus = 5; }
                    else if (e.userData.type === 'DOOR' && e.visible) initLevel(2);
                }
            });
        }

        function triggerEncounter(e) { 
            gameState = 'ENCOUNTER'; currentEnemy = e; 
            document.getElementById('encounter-overlay').style.display = 'flex'; 
            document.getElementById('foe-name').innerText = e.userData.name;
        }

        window.resolveCombat = (action) => {
            const roll = Math.floor(Math.random() * 20) + 1;
            if (action === 'ATTACK') {
                if (roll + str + weaponBonus >= currentEnemy.userData.ac) {
                    currentEnemy.userData.health -= (5 + weaponBonus);
                    if(currentEnemy.userData.health <= 0) {
                        currentEnemy.visible = false; currentEnemy.userData.active = false;
                        document.getElementById('encounter-overlay').style.display = 'none';
                        gameState = 'RUNNING';
                        if(currentEnemy.userData.type === 'BOSS') showDoorFanfare();
                    }
                } else { hp -= 2; }
            } else {
                if (roll + 2 >= 12) { gameState = 'RUNNING'; document.getElementById('encounter-overlay').style.display = 'none'; }
                else hp -= 1;
            }
            document.getElementById('hp-bar').innerText = "|".repeat(Math.max(0, hp));
            if(hp <= 0) location.reload();
        };

        function showDoorFanfare() {
            doorMesh.visible = true;
            let scale = 1;
            const pulse = () => {
                scale = 1 + Math.sin(Date.now() * 0.01) * 0.2;
                doorMesh.scale.set(scale, scale, scale);
                if (doorMesh.visible) requestAnimationFrame(pulse);
            };
            pulse();
        }

        function buildLevel2Styles() {
            // Rework the world for Level 2 (16-bit)
            // This is where we swap textures. 
            gameState = 'RUNNING';
            document.getElementById('status-bar').style.background = "#4e4a4e";
            document.getElementById('status-bar').style.color = "#ffffff";
            scene.background = new THREE.Color(0x1a1a2e);
            // Logic for Level 2 Geometry would go here
        }

        // --- INPUTS ---
        window.addEventListener('keydown', (e) => {
            if (e.code.includes('Up')) move(0, 1); if (e.code.includes('Down')) move(0, -1);
            if (e.code.includes('Left')) move(-1, 0); if (e.code.includes('Right')) move(1, 0);
        });
        window.addEventListener('touchstart', (e) => {
            if (gameState !== 'RUNNING') return;
            const x = e.touches[0].clientX / window.innerWidth, y = e.touches[0].clientY / window.innerHeight;
            if (y < 0.3) move(0, 1); else if (y > 0.7) move(0, -1);
            else if (x < 0.3) move(-1, 0); else if (x > 0.7) move(1, 0);
        });

        function animate() {
            requestAnimationFrame(animate);
            worldGroup.position.lerp(targetWorldPos, 0.15);
            playerIcon.rotation.y += 0.05;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
