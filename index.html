<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amber Terminal v9.2 - Core Access</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --amber-dim: #996a00; --bg: #0a0500; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'VT323', monospace; color: var(--amber); touch-action: none; text-transform: uppercase; }
        
        /* STATE: SPLASH SCREEN */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 4px solid var(--amber); box-sizing: border-box;
        }
        #splash-screen h1 { font-size: 3rem; margin-bottom: 0.5rem; text-shadow: 0 0 10px var(--amber); }
        #splash-screen p { font-size: 1.2rem; color: var(--amber-dim); margin-bottom: 2rem; }
        #start-button {
            background: var(--bg); border: 3px solid var(--amber); color: var(--amber);
            font-family: 'VT323', monospace; font-size: 1.5rem; padding: 10px 30px;
            cursor: pointer; text-transform: uppercase; transition: all 0.1s;
        }
        #start-button:hover { background: var(--amber); color: var(--bg); }

        /* UI ELEMENTS */
        #status-bar {
            position: fixed; top: 0; width: 100%; height: 30px;
            background: var(--amber); color: var(--bg);
            display: flex; justify-content: space-around; align-items: center;
            font-size: 1.2rem; font-weight: bold; z-index: 20;
        }
        #text-buffer {
            position: fixed; bottom: 10px; left: 10px; right: 10px; height: 60px;
            border: 1px solid var(--amber-dim); background: rgba(10, 5, 0, 0.8);
            padding: 10px; pointer-events: none; z-index: 20;
        }

        /* CRT EFFECTS */
        .crt-container { position: relative; width: 100vw; height: 100vh; }
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 15;
        }
        .glow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 100px rgba(255, 176, 0, 0.1);
            pointer-events: none; z-index: 16;
            animation: flicker 0.2s infinite;
        }
        @keyframes flicker {
            0% { opacity: 0.96; } 50% { opacity: 1; } 100% { opacity: 0.98; }
        }
    </style>
</head>
<body>
    <div id="splash-screen">
        <h1>ACCESS MAIN_FRAME</h1>
        <p>TERMINAL EMULATION V9.2</p>
        <button id="start-button">Venture Forth</button>
    </div>

    <div id="status-bar">
        <span>LOC: SECTOR_7_HULL</span>
        <span>SCORE: <span id="score-val">0000</span></span>
    </div>

    <div class="crt-container">
        <div class="scanlines"></div>
        <div class="glow"></div>
        <div id="game-container"></div>
    </div>

    <div id="text-buffer">
        <div id="log-content">> SYSTEM READY...</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- CONSTANTS ---
        const AMBER = 0xffb000;
        let moveSpeed = 0.12;
        let score = 0;
        let gameState = 'SPLASH'; // 'SPLASH' or 'RUNNING'

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        const aspect = window.innerWidth / window.innerHeight;
        const d = 5; // Camera zoom depth
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 1000);
        camera.position.z = 10;

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        // --- WORLD GROUPS ---
        const worldGroup = new THREE.Group();
        const targetWorldPos = new THREE.Vector3(0, 0, 0);
        const physicalWalls = []; // To store bounding boxes for collision
        scene.add(worldGroup);

        // --- VECTOR GRAPHICS & COLLISION SETUP ---
        // 1. Player (Diamond Wireframe)
        const playerGeo = new THREE.OctahedronGeometry(0.3, 0);
        const playerMat = new THREE.MeshBasicMaterial({ color: AMBER, wireframe: true });
        const playerIcon = new THREE.Mesh(playerGeo, playerMat);
        scene.add(playerIcon); // Player is static, not in worldGroup

        // 2. Map Layout (Green grid helper)
        const grid = new THREE.GridHelper(30, 30, 0x111100, 0x111100);
        grid.rotation.x = Math.PI / 2;
        grid.position.z = -0.1;
        worldGroup.add(grid);

        // 3. Walls (Vector Wireframe Boxes)
        function createWall(x, y, w, h) {
            const wallGeo = new THREE.BoxGeometry(w, h, 1);
            const wallMat = new THREE.MeshBasicMaterial({ color: AMBER, wireframe: true });
            const wallMesh = new THREE.Mesh(wallGeo, wallMat);
            wallMesh.position.set(x, y, 0);
            worldGroup.add(wallMesh);
            
            // Define bounding box for collision check
            const box = new THREE.Box3();
            box.setFromObject(wallMesh);
            physicalWalls.push(box);
        }
        // Define a maze
        createWall(3, 0, 1, 5);  // Vertical Wall
        createWall(-2, 3, 6, 1); // Horizontal Wall
        createWall(-4, -2, 1, 4); 

        // 4. Interactive Items
        const collectibles = [];
        function createItem(x, y, type) {
            let itemGeo, itemMat;
            if (type === 'speed') { // Yellow speed boost (rotating wireframe cube)
                itemGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                itemMat = new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true });
            } else { // Data-Core (small pyramid)
                itemGeo = new THREE.ConeGeometry(0.25, 0.5, 4);
                itemMat = new THREE.MeshBasicMaterial({ color: AMBER, wireframe: true });
            }
            const itemMesh = new THREE.Mesh(itemGeo, itemMat);
            itemMesh.position.set(x, y, 0);
            itemMesh.userData = { type: type, active: true };
            worldGroup.add(itemMesh);
            collectibles.push(itemMesh);
        }
        createItem(5, 5, 'speed'); // Top right
        createItem(-1, -1, 'data'); // Data Cores
        createItem(-5, 4, 'data');
        createItem(1, -3, 'data');

        // --- UI LOGIC ---
        function updateLog(msg) {
            const log = document.getElementById('log-content');
            log.innerHTML += `<br>> ${msg}`;
            if (log.innerHTML.split('<br>').length > 3) {
                log.innerHTML = log.innerHTML.split('<br>').slice(1).join('<br>');
            }
        }

        // --- INTERACTION / STATE CHANGE ---
        document.getElementById('start-button').addEventListener('click', () => {
            gameState = 'RUNNING';
            document.getElementById('splash-screen').style.display = 'none';
            // Start position reset (just in case)
            targetWorldPos.set(0, 0, 0);
            updateLog("CORE ACCESS GRANTED.");
            updateLog("AWAITING NAVIGATION INPUT.");
        });

        // --- INPUT HANDLING ---
        const keys = {};
        const touch = { active: false, start: new THREE.Vector2(), current: new THREE.Vector2() };
        
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        window.addEventListener('touchstart', (e) => {
            if (gameState !== 'RUNNING') return;
            touch.active = true;
            touch.start.set(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchmove', (e) => {
            if (gameState !== 'RUNNING' || !touch.active) return;
            touch.current.set(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchend', () => touch.active = false);

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (gameState !== 'RUNNING') return; // Pause main loop during Splash

            // 1. Calculate next *proposed* movement vector
            let proposedMove = new THREE.Vector3(0, 0, 0);
            if (keys['ArrowUp'] || keys['KeyW']) proposedMove.y -= moveSpeed;
            if (keys['ArrowDown'] || keys['KeyS']) proposedMove.y += moveSpeed;
            if (keys['ArrowLeft'] || keys['KeyA']) proposedMove.x += moveSpeed;
            if (keys['ArrowRight'] || keys['KeyD']) proposedMove.x -= moveSpeed;

            if (touch.active && touch.current.x !== 0) {
                const dir = new THREE.Vector2().subVectors(touch.current, touch.start).normalize();
                proposedMove.x -= dir.x * moveSpeed; proposedMove.y += dir.y * moveSpeed;
            }

            // 2. Inverse Collision Prediction (AABB logic)
            // We project where the *walls* will be, relative to stationary $(0,0,0)$
            let collisionDetected = false;
            const nextWorldPos = targetWorldPos.clone().add(proposedMove);
            const playerBox = new THREE.Box3().setFromObject(playerIcon); // Small central box

            physicalWalls.forEach(wallBox => {
                // To check collision, we must translate the static wall boxes by the world offset.
                // It's simpler to translate the player by the *inverse* offset, but that breaks Three.js convention.
                // So, we just translate the wall box temporarily to world space.
                const translatedWallBox = wallBox.clone().translate(worldGroup.position);
                if (playerBox.intersectsBox(translatedWallBox)) {
                    collisionDetected = true;
                }
            });

            // 3. Apply movement *only* if no collision
            if (!collisionDetected) {
                targetWorldPos.add(proposedMove);
            }

            // 4. v9.2 Lerp Smoothing
            worldGroup.position.lerp(targetWorldPos, 0.12);

            // 5. Visual Flourish (Rotations)
            playerIcon.rotation.y += 0.02;
            collectibles.forEach(item => { if(item.userData.active) item.rotation.z += 0.01; });

            // 6. Interaction Check (Check if collectibles are at screen center)
            collectibles.forEach(item => {
                if (item.userData.active) {
                    const itemWorldPos = new THREE.Vector3();
                    item.getWorldPosition(itemWorldPos);
                    
                    if (itemWorldPos.distanceTo(new THREE.Vector3(0, 0, 0)) < 0.4) {
                        item.userData.active = false;
                        item.visible = false;
                        
                        if (item.userData.type === 'speed') {
                            moveSpeed = 0.3;
                            score += 500;
                            updateLog("SPEED_BOOST_MODIFIER ACTIVE.");
                        } else {
                            score += 100;
                            updateLog("DATA_CORE DOWNLOADED.");
                        }
                        document.getElementById('score-val').innerText = score.toString().padStart(4, '0');
                    }
                }
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
