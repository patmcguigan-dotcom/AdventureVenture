<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amber Dungeons v11.3 - Alistair's Rage</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --bg: #050300; --blue: #1a1c2c; --white: #ffffff; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'VT323', monospace; color: var(--amber); touch-action: none; text-transform: uppercase; transition: background 1s; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 500; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 4px solid var(--amber); box-sizing: border-box; text-align: center; }
        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 500px; background: var(--bg); border: 4px double var(--amber); padding: 20px; z-index: 300; display: none; flex-direction: column; align-items: center; text-align: center; }
        .btn { background: var(--bg); border: 2px solid var(--amber); color: var(--amber); padding: 12px 20px; cursor: pointer; font-family: 'VT323'; font-size: 1.3rem; margin: 5px; }

        #status-bar { position: fixed; top: 0; width: 100%; height: 60px; background: var(--amber); color: var(--bg); display: flex; justify-content: space-around; align-items: center; font-weight: bold; z-index: 20; }
        #rage-container { width: 100px; height: 10px; border: 1px solid var(--bg); background: rgba(0,0,0,0.2); margin-top: 2px; }
        #rage-bar { width: 0%; height: 100%; background: #ff4444; transition: width 0.3s; }
        
        #text-buffer { position: fixed; bottom: 10px; left: 10px; right: 10px; height: 60px; border: 1px solid #442e00; background: rgba(5, 3, 0, 0.9); padding: 10px; z-index: 20; font-size: 1.1rem; overflow: hidden; }
        .log-crit { color: #ff4444; font-weight: bold; }
        .log-heal { color: #38b764; }
        .scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%); background-size: 100% 4px; pointer-events: none; z-index: 600; }
    </style>
</head>
<body>

    <div id="splash-screen" class="overlay">
        <h1>ALISTAIR'S RAGE</h1>
        <p>LEVEL 2: THE COBALT CRYPT</p>
        <button class="btn" onclick="startGame()">Venture Forth</button>
    </div>

    <div id="dialogue-box" class="popup">
        <h3 id="diag-title">MESSAGE</h3>
        <p id="diag-text">...</p>
        <div id="diag-options" style="display:flex; justify-content: center;"></div>
    </div>

    <div id="encounter-overlay" class="popup">
        <h2 id="foe-name">FOE</h2>
        <div id="foe-hp-ui" style="color:#ff4444; margin-bottom:5px;">HP: <span id="foe-hp-val">10</span></div>
        <div id="combat-log" style="height:50px; overflow:hidden; font-size: 0.9rem;">> READY...</div>
        <div style="display:flex; flex-wrap: wrap; justify-content: center;">
            <button class="btn" onclick="resolveCombat('ATTACK')">[A]TTACK</button>
            <button class="btn" id="rage-btn" onclick="resolveCombat('RAGE')" style="display:none; border-color:#ff4444; color:#ff4444;">[R]AGE</button>
            <button class="btn" onclick="resolveCombat('ESCAPE')">[E]SCAPE</button>
        </div>
    </div>

    <div id="status-bar">
        <div>HP: [<span id="hp-bar">||||||||||||||||||||</span>]</div>
        <div>RAGE: <div id="rage-container"><div id="rage-bar"></div></div></div>
        <div>ATK: +<span id="atk-val">4</span></div>
    </div>

    <div class="scanlines"></div>
    <div id="game-container"></div>
    <div id="text-buffer"><div id="log-content">> SEARCHING...</div></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- STATE ---
        let hp = 20, maxHp = 20, str = 4, dex = 2, weaponBonus = 0, rage = 0, isRaging = 0;
        let gameState = 'SPLASH', currentEnemy = null;
        let walls = new Set(), entities = [];
        const AMBER = 0xffb000;

        // --- SCENE ---
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-8, 8, 4.5, -4.5, 0.1, 1000); camera.position.z = 10;
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);
        const worldGroup = new THREE.Group(); const targetWorldPos = new THREE.Vector3(0, 0, 0); scene.add(worldGroup);

        // Pixel Art Helper
        function createPixelTex(data, size) {
            const canvas = document.createElement('canvas'); canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            data.forEach((c, i) => { if(c!=='n'){ ctx.fillStyle=c; ctx.fillRect(i%size, Math.floor(i/size), 1, 1); }});
            const tex = new THREE.CanvasTexture(canvas); tex.magFilter = THREE.NearestFilter; return tex;
        }

        const heroMap = ['n','n','#f4cccc','#f4cccc','n','n', 'n','#f4cccc','#f4cccc','#f4cccc','#f4cccc','n', 'n','#3d85c6','#3d85c6','#3d85c6','#3d85c6','n', '#3d85c6','#3d85c6','#3d85c6','#3d85c6','#3d85c6','#3d85c6', 'n','#073763','#073763','#073763','#073763','n', 'n','#073763','n','n','#073763','n'];
        const heroTex = createPixelTex(heroMap, 6);
        const playerIcon = new THREE.Sprite(new THREE.SpriteMaterial({ map: heroTex }));
        playerIcon.scale.set(0.8, 0.8, 1); playerIcon.position.z = 2; scene.add(playerIcon);

        // --- INITIALIZE LEVEL 2 ---
        window.startGame = () => {
            gameState = 'RUNNING'; document.getElementById('splash-screen').style.display = 'none';
            document.body.style.background = "#1a1c2c";
            document.getElementById('status-bar').style.background = "#3a3f5e";
            document.getElementById('status-bar').style.color = "#ffffff";
            
            // Build simple Room
            for(let x=-10; x<=10; x++) { walls.add(`${x},-6`); walls.add(`${x},6`); }
            walls.forEach(c => {
                const [x,y] = c.split(',').map(Number);
                const m = new THREE.Mesh(new THREE.BoxGeometry(0.9,0.9,0.5), new THREE.MeshBasicMaterial({color: 0x8b93af}));
                m.position.set(x,y,0.2); worldGroup.add(m);
            });

            spawn(3, 0, 'ENEMY', 'SKELETON', 13, 15);
            spawn(-3, 2, 'ENEMY', 'SLIME', 8, 20);
            spawn(0, 4, 'CHEST', 'CHEST', 0, 0);
            spawn(-5, -2, 'ALTAR', 'ALTAR', 0, 0);
            updateUI();
        };

        function spawn(x, y, type, name, ac, health) {
            let color = type==='ENEMY' ? (name==='SKELETON' ? 0xeeeeee : 0x38b764) : 0xffcd75;
            const m = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshBasicMaterial({color}));
            m.position.set(x,y,0.3); m.userData = {type, name, ac, health, active: true};
            worldGroup.add(m); entities.push(m);
        }

        // --- COMBAT LOGIC (V11.3) ---
        window.resolveCombat = (action) => {
            if (gameState === 'RESOLVING') return;
            const roll = Math.floor(Math.random() * 20) + 1;
            const atkBonus = str + weaponBonus + (isRaging > 0 ? 4 : 0);

            if (action === 'RAGE') {
                isRaging = 3; rage = 0;
                updateCombatLog("ALISTAIR RAGES!", "log-crit");
                document.getElementById('rage-btn').style.display = 'none';
                updateUI(); return;
            }

            if (action === 'ATTACK') {
                if (roll + atkBonus >= currentEnemy.userData.ac) {
                    let dmg = (5 + weaponBonus) * (isRaging > 0 ? 2 : 1);
                    currentEnemy.userData.health -= dmg;
                    updateCombatLog(`HIT FOR ${dmg} DMG!`);
                } else {
                    updateCombatLog("MISS!", "log-warn");
                    gainRage(15);
                }
            } else if (action === 'ESCAPE') {
                if (roll + dex >= 12) {
                    gameState = 'RUNNING'; document.getElementById('encounter-overlay').style.display = 'none';
                    targetWorldPos.x += 1; return;
                }
            }

            if (currentEnemy.userData.health > 0) {
                gameState = 'RESOLVING';
                setTimeout(() => {
                    let dmg = isRaging > 0 ? 1 : 3;
                    hp -= dmg; gainRage(10);
                    updateCombatLog(`FOE HITS FOR ${dmg} DMG!`);
                    gameState = 'ENCOUNTER'; updateUI();
                    if (hp <= 0) location.reload();
                }, 600);
            } else {
                currentEnemy.visible = false; currentEnemy.userData.active = false;
                document.getElementById('encounter-overlay').style.display = 'none';
                gameState = 'RUNNING'; updateLog("FOE DEFEATED.");
            }
            if (isRaging > 0) isRaging--;
            updateUI();
        };

        function gainRage(amt) {
            rage = Math.min(100, rage + amt);
            if (rage >= 100) document.getElementById('rage-btn').style.display = 'inline-block';
        }

        // --- INTERACTIONS ---
        function move(dx, dy) {
            if(gameState !== 'RUNNING') return;
            const nx = Math.round(-targetWorldPos.x + dx), ny = Math.round(-targetWorldPos.y + dy);
            if(walls.has(`${nx},${ny}`)) return;
            targetWorldPos.x -= dx; targetWorldPos.y -= dy;
            entities.forEach(e => {
                if(!e.userData.active) return;
                if(e.position.x === nx && e.position.y === ny) {
                    if(e.userData.type === 'ENEMY') {
                        currentEnemy = e; gameState = 'ENCOUNTER';
                        document.getElementById('encounter-overlay').style.display = 'flex';
                        document.getElementById('foe-name').innerText = e.userData.name;
                    } else if(e.userData.type === 'ALTAR') {
                        maxHp += 5; hp += 5; e.userData.active = false; e.material.color.set(0x444444);
                        updateLog("ALTAR BLESSED YOU: +5 MAX HP"); updateUI();
                    } else if(e.userData.type === 'CHEST') {
                        hp = Math.min(maxHp, hp + 5); e.userData.active = false; e.visible = false;
                        updateLog("FOUND POTION IN CHEST!"); updateUI();
                    }
                }
            });
        }

        function updateUI() {
            document.getElementById('hp-bar').innerText = "|".repeat(Math.max(0, hp));
            document.getElementById('rage-bar').style.width = `${rage}%`;
            document.getElementById('foe-hp-val').innerText = currentEnemy ? currentEnemy.userData.health : 0;
        }
        function updateLog(msg) { document.getElementById('log-content').innerHTML = `> ${msg}<br>` + document.getElementById('log-content').innerHTML; }
        function updateCombatLog(msg, cl="") { document.getElementById('combat-log').innerHTML = `<div class="${cl}">> ${msg}</div>` + document.getElementById('combat-log').innerHTML; }

        window.addEventListener('keydown', e => {
            if(e.code.includes('Up')) move(0,1); if(e.code.includes('Down')) move(0,-1);
            if(e.code.includes('Left')) move(-1,0); if(e.code.includes('Right')) move(1,0);
        });

        function animate() {
            requestAnimationFrame(animate);
            worldGroup.position.lerp(targetWorldPos, 0.15);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
