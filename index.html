<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amber Dungeons v11.5 - Restoration</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --bg: #050300; --blue: #1a1c2c; --white: #ffffff; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'VT323', monospace; color: var(--amber); touch-action: none; text-transform: uppercase; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 500; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 4px solid var(--amber); box-sizing: border-box; text-align: center; }
        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 500px; background: var(--bg); border: 4px double var(--amber); padding: 20px; z-index: 300; display: none; flex-direction: column; align-items: center; text-align: center; }
        .btn { background: var(--bg); border: 2px solid var(--amber); color: var(--amber); padding: 12px 20px; cursor: pointer; font-family: 'VT323'; font-size: 1.3rem; margin: 5px; }

        #status-bar { position: fixed; top: 0; width: 100%; height: 60px; background: var(--amber); color: var(--bg); display: flex; justify-content: space-around; align-items: center; font-weight: bold; z-index: 20; transition: all 0.5s; }
        #rage-container { width: 100px; height: 10px; border: 1px solid var(--bg); background: rgba(0,0,0,0.2); margin-top: 2px; }
        #rage-bar { width: 0%; height: 100%; background: #ff4444; transition: width 0.3s; }
        
        #text-buffer { position: fixed; bottom: 10px; left: 10px; right: 10px; height: 60px; border: 1px solid #442e00; background: rgba(5, 3, 0, 0.9); padding: 10px; z-index: 20; font-size: 1.1rem; overflow: hidden; }
        .log-crit { color: #ff4444; font-weight: bold; }
        .scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%); background-size: 100% 4px; pointer-events: none; z-index: 600; }
    </style>
</head>
<body>

    <div id="splash-screen" class="overlay">
        <h1>ALISTAIR'S QUEST</h1>
        <p>LEVEL 1: THE AMBER DEPTHS</p>
        <button class="btn" onclick="startGame()">Venture Forth</button>
    </div>

    <div id="dialogue-box" class="popup">
        <h3 id="diag-title">MESSAGE</h3>
        <p id="diag-text">...</p>
        <div id="diag-options" style="display:flex; justify-content: center;"></div>
    </div>

    <div id="encounter-overlay" class="popup">
        <h2 id="foe-name">FOE</h2>
        <div id="foe-hp-ui" style="color:#ff4444; margin-bottom:5px;">HP: <span id="foe-hp-val">10</span></div>
        <div id="combat-log" style="height:50px; overflow:hidden; font-size: 0.9rem;">> READY...</div>
        <div style="display:flex; flex-wrap: wrap; justify-content: center;">
            <button class="btn" onclick="resolveCombat('ATTACK')">[A]TTACK</button>
            <button class="btn" id="rage-btn" onclick="resolveCombat('RAGE')" style="display:none; border-color:#ff4444; color:#ff4444;">[R]AGE</button>
            <button class="btn" onclick="resolveCombat('ESCAPE')">[E]SCAPE</button>
        </div>
    </div>

    <div id="status-bar">
        <div>HP: [<span id="hp-bar">||||||||||||||||||||</span>]</div>
        <div>RAGE: <div id="rage-container"><div id="rage-bar"></div></div></div>
        <div>ATK: +<span id="atk-val">4</span></div>
    </div>

    <div class="scanlines"></div>
    <div id="game-container"></div>
    <div id="text-buffer"><div id="log-content">> SEARCHING...</div></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- STATE ---
        let hp = 20, maxHp = 20, str = 4, dex = 2, weaponBonus = 0, rage = 0, isRaging = 0;
        let gameState = 'SPLASH', currentLevel = 1, metGuard = false, currentEnemy = null;
        let walls = new Set(), entities = [];
        const AMBER = 0xffb000;

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-8, 8, 4.5, -4.5, 0.1, 1000); camera.position.z = 10;
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);
        const worldGroup = new THREE.Group(); const targetWorldPos = new THREE.Vector3(0, 0, 0); scene.add(worldGroup);

        // Player Icon
        let playerIcon = new THREE.Mesh(new THREE.OctahedronGeometry(0.35, 0), new THREE.MeshBasicMaterial({color: AMBER, wireframe: true}));
        playerIcon.position.z = 2; scene.add(playerIcon);

        // --- PIXEL ART GEN ---
        function createPixelTex(data, size) {
            const canvas = document.createElement('canvas'); canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            data.forEach((c, i) => { if(c!=='n'){ ctx.fillStyle=c; ctx.fillRect(i%size, Math.floor(i/size), 1, 1); }});
            const tex = new THREE.CanvasTexture(canvas); tex.magFilter = THREE.NearestFilter; return tex;
        }
        const heroMap = ['n','n','#f4cccc','#f4cccc','n','n', 'n','#f4cccc','#f4cccc','#f4cccc','#f4cccc','n', 'n','#3d85c6','#3d85c6','#3d85c6','#3d85c6','n', '#3d85c6','#3d85c6','#3d85c6','#3d85c6','#3d85c6','#3d85c6', 'n','#073763','#073763','#073763','#073763','n', 'n','#073763','n','n','#073763','n'];

        // --- CORE LEVEL ENGINE ---
        window.startGame = () => {
            gameState = 'RUNNING';
            document.getElementById('splash-screen').style.display = 'none';
            initLevel(1); 
        };

        function initLevel(num) {
            currentLevel = num;
            entities.forEach(e => worldGroup.remove(e)); entities = []; walls.clear();
            worldGroup.position.set(0, 0, 0); targetWorldPos.set(0, 0, 0);

            if (num === 1) {
                // RESET TO LEVEL 1 STYLE
                document.body.style.background = "#050300";
                document.getElementById('status-bar').style.background = AMBER;
                document.getElementById('status-bar').style.color = "#050300";
                
                // Boundaries
                for(let x=-15; x<=15; x++) { walls.add(`${x},-10`); walls.add(`${x},15`); }
                // Throne Room Walls
                for(let x=3; x<=7; x++) { walls.add(`${x},6`); walls.add(`${x},10`); }
                
                buildWalls(0x442200, true);
                spawn(1, 0, 'NPC', 'GUARD');
                spawn(-5, -5, 'SWORD', 'CLAYMORE');
                spawn(5, 8, 'BOSS', 'GOBLIN_KING', 18, 30);
                spawn(5, 12, 'DOOR', 'PORTAL'); // Visible after boss death
                updateLog("LEVEL 1: AMBER DEPTHS.");
            } else {
                // LEVEL 2 TRANSITION
                gameState = 'LEVEL2';
                document.body.style.background = "#1a1c2c";
                document.getElementById('status-bar').style.background = "#3a3f5e";
                document.getElementById('status-bar').style.color = "#ffffff";
                
                // Humanoid Sprite
                scene.remove(playerIcon);
                playerIcon = new THREE.Sprite(new THREE.SpriteMaterial({ map: createPixelTex(heroMap, 6) }));
                playerIcon.scale.set(0.8, 0.8, 1); playerIcon.position.z = 2; scene.add(playerIcon);

                for(let x=-10; x<=10; x++) { walls.add(`${x},-6`); walls.add(`${x},6`); }
                buildWalls(0x8b93af, false);
                spawn(3, 0, 'ENEMY', 'SKELETON', 13, 15);
                spawn(-3, 2, 'ENEMY', 'SLIME', 8, 20);
                spawn(0, 4, 'CHEST', 'CHEST');
                spawn(-5, -2, 'ALTAR', 'ALTAR');
                updateLog("LEVEL 2: COBALT CRYPT.");
            }
            updateUI();
        }

        function buildWalls(color, wire) {
            walls.forEach(c => {
                const [x,y] = c.split(',').map(Number);
                const m = new THREE.Mesh(new THREE.BoxGeometry(0.9,0.9,0.5), new THREE.MeshBasicMaterial({color, wireframe: wire}));
                m.position.set(x,y,0.2); worldGroup.add(m);
            });
        }

        function spawn(x, y, type, name, ac=0, health=0) {
            const isLvl2 = currentLevel === 2;
            let geo = (type==='BOSS') ? new THREE.TorusKnotGeometry(0.4,0.1) : new THREE.BoxGeometry(0.5,0.5,0.5);
            if(type==='NPC') geo = new THREE.CylinderGeometry(0,0.3,0.6,4);
            if(type==='DOOR') geo = new THREE.TorusGeometry(0.5, 0.1, 8, 6);
            
            let color = type==='ENEMY' ? 0xff4444 : (type==='NPC'? 0x00ffff : 0x38b764);
            if(isLvl2 && name==='SKELETON') color = 0xeeeeee;

            const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color, wireframe: currentLevel===1}));
            m.position.set(x,y,0.3); m.userData = {type, name, ac, health, active: true};
            if(type==='DOOR') m.visible = false;
            worldGroup.add(m); entities.push(m);
        }

        // --- INTERACTIONS ---
        function move(dx, dy) {
            if(gameState !== 'RUNNING' && gameState !== 'LEVEL2') return;
            const nx = Math.round(-targetWorldPos.x + dx), ny = Math.round(-targetWorldPos.y + dy);
            if(walls.has(`${nx},${ny}`)) return;
            if(nx < -15 || nx > 15 || ny < -10 || ny > 15) return; // Boundary

            targetWorldPos.x -= dx; targetWorldPos.y -= dy;
            checkInteractions(nx, ny);
        }

        function checkInteractions(px, py) {
            entities.forEach(e => {
                if(!e.userData.active && e.userData.type !== 'DOOR') return;
                if(e.position.x === px && e.position.y === py) {
                    if(e.userData.type === 'NPC') {
                        gameState = 'DIALOGUE';
                        document.getElementById('dialogue-box').style.display = 'flex';
                        if(!metGuard) {
                            document.getElementById('diag-text').innerText = "THE GOBLINS INFEST THE NORTH. FIND THE CLAYMORE TO THE WEST.";
                            document.getElementById('diag-options').innerHTML = `<button class="btn" onclick="closeDiag()">PROCEED</button>`;
                            metGuard = true;
                        } else {
                            document.getElementById('diag-text').innerText = "REST TO REGAIN HEALTH?";
                            document.getElementById('diag-options').innerHTML = `<button class="btn" onclick="rest()">REST</button><button class="btn" onclick="closeDiag()">NO</button>`;
                        }
                    } else if(e.userData.type === 'SWORD') {
                        e.userData.active = false; e.visible = false; weaponBonus = 5; updateLog("ATK +5");
                    } else if(e.userData.type === 'DOOR' && e.visible) {
                        initLevel(2);
                    } else if(e.userData.type === 'ALTAR') {
                        maxHp += 5; hp += 5; e.userData.active = false; e.material.color.set(0x444444); updateLog("MAX HP UP");
                    } else if(e.userData.type === 'ENEMY' || e.userData.type === 'BOSS') {
                        currentEnemy = e; gameState = 'ENCOUNTER';
                        document.getElementById('encounter-overlay').style.display = 'flex';
                        document.getElementById('foe-name').innerText = e.userData.name;
                    }
                }
            });
            updateUI();
        }

        window.closeDiag = () => { gameState = (currentLevel === 1 ? 'RUNNING' : 'LEVEL2'); document.getElementById('dialogue-box').style.display = 'none'; };
        window.rest = () => { hp = Math.min(maxHp, hp + 8); updateLog("RECOVERED HP."); closeDiag(); updateUI(); };

        // --- COMBAT V11.5 ---
        window.resolveCombat = (action) => {
            if (gameState === 'RESOLVING') return;
            const roll = Math.floor(Math.random() * 20) + 1;
            if(action === 'RAGE') { isRaging = 3; rage = 0; updateUI(); return; }
            if(action === 'ATTACK') {
                if(roll + str + weaponBonus >= currentEnemy.userData.ac) {
                    currentEnemy.userData.health -= (5+weaponBonus) * (isRaging > 0 ? 2 : 1);
                    if(currentEnemy.userData.health <= 0) {
                        currentEnemy.visible = false; currentEnemy.userData.active = false;
                        document.getElementById('encounter-overlay').style.display = 'none';
                        gameState = (currentLevel === 1 ? 'RUNNING' : 'LEVEL2');
                        if(currentEnemy.userData.type === 'BOSS') entities.find(d=>d.userData.type==='DOOR').visible = true;
                    }
                } else { hp -= 2; rage = Math.min(100, rage + 20); }
            } else { // ESCAPE
                gameState = (currentLevel === 1 ? 'RUNNING' : 'LEVEL2'); document.getElementById('encounter-overlay').style.display = 'none';
            }
            if(hp <= 0) location.reload();
            if(isRaging > 0) isRaging--;
            updateUI();
        };

        // --- TOUCH CONTROLS FIXED ---
        window.addEventListener('touchstart', e => {
            if (gameState !== 'RUNNING' && gameState !== 'LEVEL2') return;
            const x = e.touches[0].clientX / window.innerWidth;
            const y = e.touches[0].clientY / window.innerHeight;
            // Screen Quadrant Check
            if (y < 0.3) move(0, 1);        // Top
            else if (y > 0.7) move(0, -1);  // Bottom
            else if (x < 0.3) move(-1, 0);  // Left
            else if (x > 0.7) move(1, 0);   // Right
        });

        window.addEventListener('keydown', e => {
            if(e.code.includes('Up')) move(0,1); if(e.code.includes('Down')) move(0,-1);
            if(e.code.includes('Left')) move(-1,0); if(e.code.includes('Right')) move(1,0);
        });

        function updateUI() {
            document.getElementById('hp-bar').innerText = "|".repeat(Math.max(0, hp));
            document.getElementById('rage-bar').style.width = `${rage}%`;
            document.getElementById('atk-val').innerText = str + weaponBonus + (isRaging > 0 ? " [RAGE]" : "");
            document.getElementById('rage-btn').style.display = (rage >= 100) ? 'inline-block' : 'none';
            if(currentEnemy) document.getElementById('foe-hp-val').innerText = currentEnemy.userData.health;
        }
        function updateLog(msg) { document.getElementById('log-content').innerHTML = `> ${msg}<br>` + document.getElementById('log-content').innerHTML; }

        function animate() {
            requestAnimationFrame(animate);
            worldGroup.position.lerp(targetWorldPos, 0.15);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
