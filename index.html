<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amber Dungeons v9.9</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --amber-dim: #553a00; --bg: #050300; --white: #ffffff; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'VT323', monospace; color: var(--amber); touch-action: none; text-transform: uppercase; }
        
        .overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 500px; background: var(--bg); border: 4px double var(--amber);
            padding: 20px; z-index: 300; display: none; flex-direction: column; align-items: center; text-align: center;
        }

        .btn {
            background: var(--bg); border: 2px solid var(--amber); color: var(--amber);
            padding: 12px 20px; cursor: pointer; font-family: 'VT323'; font-size: 1.3rem; margin: 10px;
        }
        .btn:active { background: var(--amber); color: var(--bg); }

        #status-bar {
            position: fixed; top: 0; width: 100%; height: 50px;
            background: var(--amber); color: var(--bg);
            display: flex; justify-content: space-around; align-items: center; font-weight: bold; z-index: 20;
        }
        #text-buffer {
            position: fixed; bottom: 10px; left: 10px; right: 10px; height: 60px;
            border: 1px solid var(--amber-dim); background: rgba(5, 3, 0, 0.9);
            padding: 10px; z-index: 20; font-size: 1.1rem; overflow: hidden;
        }
        .scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; pointer-events: none; z-index: 400; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div>HERO: ALISTAIR<br>HP: [<span id="hp-bar">||||||||||||||||||||</span>]</div>
        <div>WEAPON: <span id="weap-name">NONE</span></div>
    </div>

    <div id="dialogue-box" class="overlay">
        <h3 id="diag-title">MESSAGE</h3>
        <p id="diag-text">...</p>
        <div id="diag-options" style="display:flex;">
            <button class="btn" onclick="closeDialogue()">[X] CLOSE</button>
        </div>
    </div>

    <div id="victory-screen" class="overlay">
        <h1 style="color:var(--white)">VICTORY ATTAINED</h1>
        <p>THE GOBLIN KING HAS FALLEN. THE WAY IS OPEN.</p>
        <button class="btn" onclick="closeVictory()">[ENTER NEXT LEVEL]</button>
    </div>

    <div id="encounter-overlay" class="overlay">
        <h2 id="foe-name">FOE</h2>
        <div id="combat-log">> AWAITING ACTION...</div>
        <div style="display:flex;">
            <button class="btn" onclick="resolveCombat('ATTACK')">[A]TTACK</button>
            <button class="btn" onclick="resolveCombat('DODGE')">[D]ODGE</button>
        </div>
    </div>

    <div class="scanlines"></div>
    <div id="game-container"></div>
    <div id="text-buffer"><div id="log-content">> BOOTING...</div></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- GAME STATE ---
        let hp = 20, str = 4, weaponBonus = 0, gameState = 'RUNNING';
        let metGuard = false, currentEnemy = null, victoryDoor = null;
        const AMBER = 0xffb000;

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-8, 8, 4.5, -4.5, 0.1, 1000); camera.position.z = 10;
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);
        const worldGroup = new THREE.Group(); const targetWorldPos = new THREE.Vector3(0, 0, 0); scene.add(worldGroup);

        // --- MAP ELEMENTS ---
        const grid = new THREE.GridHelper(40, 40, 0x221100, 0x110800); grid.rotation.x = Math.PI / 2; worldGroup.add(grid);
        function addWall(x, y) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.95, 0.5), new THREE.MeshBasicMaterial({ color: AMBER, wireframe: true }));
            m.position.set(x, y, 0); worldGroup.add(m);
        }
        for(let i=3; i<=7; i++) { addWall(i, 4); addWall(i, 8); } // Boss room boundaries

        // --- ENTITIES ---
        const entities = [];
        function spawn(x, y, type, name, ac, health) {
            let geo = (type === 'BOSS') ? new THREE.TorusKnotGeometry(0.4, 0.1) : new THREE.IcosahedronGeometry(0.4, 0);
            if(type === 'NPC') geo = new THREE.CylinderGeometry(0, 0.3, 0.6, 4);
            if(type === 'SWORD') geo = new THREE.BoxGeometry(0.1, 0.6, 0.1);
            if(type === 'DOOR') geo = new THREE.PlaneGeometry(0.8, 1.2);

            const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: type === 'NPC' ? 0x00ffff : AMBER, wireframe: true }));
            mesh.position.set(x, y, 0);
            mesh.userData = { type, name, ac, health, active: true };
            if(type === 'DOOR') { mesh.visible = false; victoryDoor = mesh; }
            worldGroup.add(mesh); entities.push(mesh);
        }

        spawn(1, 0, 'NPC', 'GUARD', 0, 0);
        spawn(-3, 0, 'SWORD', 'CLAYMORE', 0, 0);
        spawn(5, 6, 'BOSS', 'GOBLIN_KING', 18, 20);
        spawn(5, 7.5, 'DOOR', 'LEVEL_EXIT', 0, 0);

        // --- INTERACTION LOGIC ---
        window.closeDialogue = () => {
            gameState = 'RUNNING';
            document.getElementById('dialogue-box').style.display = 'none';
        };

        window.restHero = () => {
            const heal = Math.floor(Math.random() * 8) + 3;
            hp = Math.min(20, hp + heal);
            updateLog(`RESTED. RECOVERED ${heal} HP.`);
            updateUI();
            closeDialogue();
        };

        function checkInteractions(px, py) {
            entities.forEach(e => {
                if (!e.userData.active && e.userData.type !== 'DOOR') return;
                if (e.position.distanceTo(new THREE.Vector3(px, py, 0)) < 0.1) {
                    if (e.userData.type === 'NPC') {
                        const box = document.getElementById('dialogue-box');
                        const text = document.getElementById('diag-text');
                        const opts = document.getElementById('diag-options');
                        box.style.display = 'flex';
                        gameState = 'DIALOGUE';
                        
                        if (!metGuard) {
                            text.innerText = "THE GOBLINS INFEST THE NORTHERN HALLS. FIND THE CLAYMORE TO THE WEST BEFORE FACING THEIR KING.";
                            opts.innerHTML = `<button class="btn" onclick="closeDialogue()">[X] I WILL PROCEED</button>`;
                            metGuard = true;
                        } else {
                            text.innerText = "YOU LOOK WEARY, ADVENTURER. REST NEAR THE GUARD TO REGAIN HEALTH?";
                            opts.innerHTML = `<button class="btn" onclick="restHero()">[Y] YES</button><button class="btn" onclick="closeDialogue()">[N] NO</button>`;
                        }
                    } else if (e.userData.type === 'SWORD') {
                        e.userData.active = false; e.visible = false; weaponBonus = 5;
                        updateLog("CLAYMORE ACQUIRED. ATK MOD +5."); updateUI();
                    } else if (e.userData.type === 'BOSS') {
                        triggerEncounter(e);
                    } else if (e.userData.type === 'DOOR' && e.visible) {
                        updateLog("LEVEL COMPLETE. VENTURING DEEPER...");
                    }
                }
            });
        }

        // --- COMBAT & VICTORY ---
        window.resolveCombat = (action) => {
            const roll = Math.floor(Math.random() * 20) + 1;
            const log = document.getElementById('combat-log');
            if (action === 'ATTACK') {
                if (roll + 4 + weaponBonus >= currentEnemy.userData.ac) {
                    currentEnemy.userData.health -= (5 + weaponBonus);
                    log.innerText = `CRITICAL HIT! FOE HEALTH: ${currentEnemy.userData.health}`;
                    if(currentEnemy.userData.health <= 0) handleBossDeath();
                } else {
                    hp -= 2; log.innerText = `MISS! FOE COUNTERS FOR 2 DMG.`;
                }
            } else {
                if (roll + 2 >= 12) log.innerText = `DODGED SUCCESSFULY.`;
                else { hp -= 1; log.innerText = `FAILED DODGE. 1 DMG TAKEN.`; }
            }
            updateUI();
            if(hp <= 0) location.reload();
        };

        function handleBossDeath() {
            currentEnemy.userData.active = false; currentEnemy.visible = false;
            document.getElementById('encounter-overlay').style.display = 'none';
            document.getElementById('victory-screen').style.display = 'flex';
            gameState = 'VICTORY';
            
            // Fanfare & Door Appearance
            victoryDoor.visible = true;
            let flashes = 0;
            const interval = setInterval(() => {
                victoryDoor.material.color.set(flashes % 2 === 0 ? 0xffffff : AMBER);
                if(++flashes > 10) {
                    clearInterval(interval);
                    victoryDoor.material.color.set(AMBER);
                }
            }, 150);
        }

        window.closeVictory = () => {
            document.getElementById('victory-screen').style.display = 'none';
            gameState = 'RUNNING';
            updateLog("THE WAY IS OPEN. HEAD NORTH.");
        };

        // --- ENGINE ---
        function move(dx, dy) {
            if (gameState !== 'RUNNING') return;
            targetWorldPos.x -= dx; targetWorldPos.y -= dy;
            checkInteractions(-targetWorldPos.x, -targetWorldPos.y);
        }

        function updateUI() {
            document.getElementById('hp-bar').innerText = "|".repeat(Math.max(0, hp));
            document.getElementById('weap-name').innerText = weaponBonus > 0 ? "CLAYMORE" : "NONE";
        }
        function updateLog(msg) { document.getElementById('log-content').innerHTML = `> ${msg}<br>` + document.getElementById('log-content').innerHTML; }

        window.addEventListener('keydown', (e) => {
            if(e.code.includes('Up')) move(0,1); if(e.code.includes('Down')) move(0,-1);
            if(e.code.includes('Left')) move(-1,0); if(e.code.includes('Right')) move(1,0);
        });

        function animate() {
            requestAnimationFrame(animate);
            worldGroup.position.lerp(targetWorldPos, 0.15);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
