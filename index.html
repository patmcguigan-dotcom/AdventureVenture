<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amber Dungeons v9.11</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --amber-dim: #442e00; --bg: #050300; --white: #ffffff; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'VT323', monospace; color: var(--amber); touch-action: none; text-transform: uppercase; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 500; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 4px solid var(--amber); box-sizing: border-box; text-align: center; }
        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 500px; background: var(--bg); border: 4px double var(--amber); padding: 20px; z-index: 300; display: none; flex-direction: column; align-items: center; text-align: center; }
        .btn { background: var(--bg); border: 2px solid var(--amber); color: var(--amber); padding: 12px 20px; cursor: pointer; font-family: 'VT323'; font-size: 1.3rem; margin: 5px; }
        .btn:active { background: var(--amber); color: var(--bg); }

        #status-bar { position: fixed; top: 0; width: 100%; height: 50px; background: var(--amber); color: var(--bg); display: flex; justify-content: space-around; align-items: center; font-weight: bold; z-index: 20; }
        #text-buffer { position: fixed; bottom: 10px; left: 10px; right: 10px; height: 60px; border: 1px solid var(--amber-dim); background: rgba(5, 3, 0, 0.9); padding: 10px; z-index: 20; font-size: 1.1rem; overflow: hidden; }
        .scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; pointer-events: none; z-index: 600; }
    </style>
</head>
<body>

    <div id="splash-screen" class="overlay">
        <h1>AMBER DUNGEONS</h1>
        <p>RESTORING PLAYER_ICON.EXE...</p>
        <button class="btn" onclick="startGame()">Venture Forth</button>
    </div>

    <div id="encounter-overlay" class="popup">
        <h2 id="foe-name">FOE</h2>
        <div id="combat-log">> READY...</div>
        <div style="display:flex;">
            <button class="btn" onclick="resolveCombat('ATTACK')">[A]TTACK</button>
            <button class="btn" onclick="resolveCombat('ESCAPE')">[E]SCAPE</button>
        </div>
    </div>

    <div id="dialogue-box" class="popup">
        <h3 id="diag-title">MESSAGE</h3>
        <p id="diag-text">...</p>
        <div id="diag-options" style="display:flex;"></div>
    </div>

    <div id="status-bar">
        <div>HP: [<span id="hp-bar">||||||||||||||||||||</span>]</div>
        <div>ATK: +<span id="atk-val">4</span></div>
        <div>LOC: <span id="loc-val">0,0</span></div>
    </div>

    <div class="scanlines"></div>
    <div id="game-container"></div>
    <div id="text-buffer"><div id="log-content">> SEARCHING...</div></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- STATE ---
        let hp = 20, str = 4, dex = 2, weaponBonus = 0, gameState = 'SPLASH';
        let prevPos = { x: 0, y: 0 }, currentEnemy = null;
        const AMBER = 0xffb000;

        // --- SCENE ---
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-8, 8, 4.5, -4.5, 0.1, 1000); camera.position.z = 10;
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);
        
        const worldGroup = new THREE.Group(); 
        const targetWorldPos = new THREE.Vector3(0, 0, 0); 
        scene.add(worldGroup);

        // --- PLAYER ICON (RESTORED) ---
        const playerIcon = new THREE.Mesh(
            new THREE.OctahedronGeometry(0.35, 0), 
            new THREE.MeshBasicMaterial({ color: AMBER, wireframe: true, transparent: true, opacity: 0.9 })
        );
        playerIcon.position.z = 2; // High Z to prevent clipping
        playerIcon.frustumCulled = false;
        scene.add(playerIcon);

        // --- DUNGEON LAYOUT ---
        const walls = new Set([
            // Corridors & Rooms
            "1,1","0,1","-1,1", // North Wall
            "-2,0","-2,-1","-2,-2", // West Corridor Wall
            "2,0","2,-1","2,-2", // East Corridor Wall
            "0,4","1,4","-1,4", // Room Entry
            "3,7","4,7","5,7","6,7","7,7", // Throne Room South Wall
            "3,9","4,9","5,9","6,9","7,9", // Throne Room North Wall
            "2,8","2,9","2,7" // Throne Room West Wall
        ]);

        walls.forEach(coord => {
            const [x, y] = coord.split(',').map(Number);
            const wall = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.9, 0.5), new THREE.MeshBasicMaterial({ color: 0x442200, wireframe: true }));
            wall.position.set(x, y, 0.25);
            worldGroup.add(wall);
        });

        const grid = new THREE.GridHelper(40, 40, 0x221100, 0x110800); grid.rotation.x = Math.PI / 2; worldGroup.add(grid);

        // --- ENTITIES ---
        const entities = [];
        function spawn(x, y, type, name, ac, health) {
            let geo = (type === 'BOSS') ? new THREE.TorusKnotGeometry(0.4, 0.1) : new THREE.IcosahedronGeometry(0.35, 0);
            if(type === 'NPC') geo = new THREE.CylinderGeometry(0, 0.3, 0.6, 4);
            if(type === 'SWORD') geo = new THREE.BoxGeometry(0.1, 0.6, 0.1);
            
            const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: type === 'NPC' ? 0x00ffff : (type === 'SWORD' ? 0xffffff : AMBER), wireframe: true }));
            mesh.position.set(x, y, 0.3);
            mesh.userData = { type, name, ac, health, active: true };
            worldGroup.add(mesh); entities.push(mesh);
        }

        spawn(1, 0, 'NPC', 'GUARD', 0, 0);
        spawn(-3, -2, 'SWORD', 'CLAYMORE', 0, 0); // Sword Room
        spawn(0, 3, 'ENEMY', 'GOBLIN', 10, 5);    // Hallway Sentry
        spawn(5, 8, 'BOSS', 'GOBLIN_KING', 18, 25); // Throne Room

        // --- ENGINE ---
        window.startGame = () => { gameState = 'RUNNING'; document.getElementById('splash-screen').style.display = 'none'; };
        window.closeDialogue = () => { gameState = 'RUNNING'; document.getElementById('dialogue-box').style.display = 'none'; };

        function move(dx, dy) {
            if (gameState !== 'RUNNING') return;
            const nextX = Math.round(-targetWorldPos.x + dx);
            const nextY = Math.round(-targetWorldPos.y + dy);

            if (walls.has(`${nextX},${nextY}`)) {
                updateLog("THUD. WALL DETECTED.");
                return;
            }

            prevPos = { x: targetWorldPos.x, y: targetWorldPos.y };
            targetWorldPos.x -= dx;
            targetWorldPos.y -= dy;
            document.getElementById('loc-val').innerText = `${nextX},${nextY}`;
            checkInteractions(nextX, nextY);
        }

        function checkInteractions(px, py) {
            entities.forEach(e => {
                if (!e.userData.active) return;
                if (e.position.x === px && e.position.y === py) {
                    if (e.userData.type === 'NPC') {
                        gameState = 'DIALOGUE';
                        const box = document.getElementById('dialogue-box');
                        box.style.display = 'flex';
                        document.getElementById('diag-text').innerText = "THE KING HIDES IN THE NORTHEAST THRONE ROOM. THE CLAYMORE LIES TO THE SOUTHWEST.";
                        document.getElementById('diag-options').innerHTML = `<button class="btn" onclick="closeDialogue()">UNDERSTOOD</button>`;
                    } else if (e.userData.type === 'SWORD') {
                        e.userData.active = false; e.visible = false; weaponBonus = 5;
                        updateLog("CLAYMORE ACQUIRED. ATK +5."); updateUI();
                    } else if (e.userData.type.includes('ENEMY') || e.userData.type === 'BOSS') {
                        triggerEncounter(e);
                    }
                }
            });
        }

        function triggerEncounter(e) {
            gameState = 'ENCOUNTER'; currentEnemy = e;
            document.getElementById('foe-name').innerText = e.userData.name;
            document.getElementById('encounter-overlay').style.display = 'flex';
        }

        window.resolveCombat = (action) => {
            const roll = Math.floor(Math.random() * 20) + 1;
            const log = document.getElementById('combat-log');
            if (action === 'ATTACK') {
                if (roll + str + weaponBonus >= currentEnemy.userData.ac) {
                    currentEnemy.userData.health -= (5 + weaponBonus);
                    log.innerText = `HIT! FOE HP: ${currentEnemy.userData.health}`;
                    if(currentEnemy.userData.health <= 0) {
                        currentEnemy.userData.active = false; currentEnemy.visible = false;
                        document.getElementById('encounter-overlay').style.display = 'none';
                        gameState = 'RUNNING';
                        updateLog("FOE SLAIN.");
                    }
                } else {
                    hp -= 2; log.innerText = `MISS! YOU TAKE 2 DMG.`;
                }
            } else if (action === 'ESCAPE') {
                if (roll + dex >= 12) {
                    gameState = 'RUNNING';
                    document.getElementById('encounter-overlay').style.display = 'none';
                    targetWorldPos.set(prevPos.x, prevPos.y, 0); // Push back
                    updateLog("SUCCESSFUL DISENGAGE.");
                } else {
                    hp -= 1; log.innerText = `ESCAPE FAILED! 1 DMG TAKEN.`;
                }
            }
            updateUI();
            if (hp <= 0) location.reload();
        };

        function updateUI() {
            document.getElementById('hp-bar').innerText = "|".repeat(Math.max(0, hp));
            document.getElementById('atk-val').innerText = str + weaponBonus;
        }
        function updateLog(msg) { document.getElementById('log-content').innerHTML = `> ${msg}<br>` + document.getElementById('log-content').innerHTML; }

        // --- INPUTS ---
        window.addEventListener('keydown', (e) => {
            if(e.code.includes('Up')) move(0,1); if(e.code.includes('Down')) move(0,-1);
            if(e.code.includes('Left')) move(-1,0); if(e.code.includes('Right')) move(1,0);
        });

        window.addEventListener('touchstart', (e) => {
            if (gameState !== 'RUNNING') return;
            const x = e.touches[0].clientX / window.innerWidth;
            const y = e.touches[0].clientY / window.innerHeight;
            if (y < 0.3) move(0, 1); else if (y > 0.7) move(0, -1);
            else if (x < 0.3) move(-1, 0); else if (x > 0.7) move(1, 0);
        });

        function animate() {
            requestAnimationFrame(animate);
            worldGroup.position.lerp(targetWorldPos, 0.15);
            playerIcon.rotation.y += 0.05;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
