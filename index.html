<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amber Dungeons v9.5 - Combat</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --amber-dim: #775200; --bg: #0a0500; --red: #ff3300; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'VT323', monospace; color: var(--amber); touch-action: none; text-transform: uppercase; }
        
        /* UI OVERLAYS */
        #encounter-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10, 5, 0, 0.95); z-index: 150; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            border: 10px double var(--amber); box-sizing: border-box;
        }
        #monster-art { font-size: 10px; line-height: 8px; margin-bottom: 20px; white-space: pre; color: var(--amber); text-shadow: 0 0 5px var(--amber); }
        
        .combat-menu { display: flex; gap: 20px; margin-top: 20px; }
        .btn {
            background: var(--bg); border: 2px solid var(--amber); color: var(--amber);
            padding: 15px 25px; cursor: pointer; font-family: 'VT323'; font-size: 1.5rem;
        }
        .btn:active { background: var(--amber); color: var(--bg); }

        #status-bar {
            position: fixed; top: 0; width: 100%; height: 35px;
            background: var(--amber); color: var(--bg);
            display: flex; justify-content: space-around; align-items: center;
            font-size: 1.2rem; font-weight: bold; z-index: 20;
        }
        #text-buffer {
            position: fixed; bottom: 10px; left: 10px; right: 10px; height: 80px;
            border: 1px solid var(--amber-dim); background: rgba(10, 5, 0, 0.9);
            padding: 10px; z-index: 20; font-size: 1.2rem; overflow: hidden;
        }
        .scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>

    <div id="status-bar">
        <span>HERO: ALISTAIR</span>
        <span>HP: [<span id="hp-bar">||||||||||||||||||||</span>]</span>
        <span>LEVEL: 01</span>
    </div>

    <div id="encounter-overlay">
        <h2 id="monster-name">FOE SPOTTED</h2>
        <div id="monster-art">
 / \
(O O)
 \-/ 
 /|\
/ | \
        </div>
        <div id="combat-log">> AWAITING ACTION...</div>
        <div class="combat-menu">
            <button class="btn" id="btn-attack">[A]TTACK</button>
            <button class="btn" id="btn-dodge">[D]ODGE</button>
        </div>
    </div>

    <div class="scanlines"></div>
    <div id="game-container"></div>

    <div id="text-buffer">
        <div id="log-content">> SEARCHING SECTOR...</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- RPG STATS ---
        let hp = 20;
        let strMod = 4; // Barbarian Strength
        let dexMod = 2;
        let gameState = 'RUNNING'; // RUNNING, ENCOUNTER, GAMEOVER
        let currentEnemy = null;

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-8, 8, 4.5, -4.5, 0.1, 1000);
        camera.position.z = 10;
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        const worldGroup = new THREE.Group();
        const targetWorldPos = new THREE.Vector3(0, 0, 0);
        scene.add(worldGroup);

        // --- ICONOGRAPHY ---
        const AMBER = 0xffb000;
        const RED = 0xff3300;

        // Player (The Hero)
        const playerIcon = new THREE.Mesh(new THREE.OctahedronGeometry(0.3), new THREE.MeshBasicMaterial({ color: AMBER, wireframe: true }));
        scene.add(playerIcon);

        // Enemies & Traps
        const entities = [];
        function addEntity(x, y, type) {
            let geo = type === 'TRAP' ? new THREE.TorusGeometry(0.2, 0.05, 8, 4) : new THREE.IcosahedronGeometry(0.4, 0);
            let color = type === 'TRAP' ? RED : AMBER;
            let mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: color, wireframe: true }));
            mesh.position.set(x, y, 0);
            mesh.userData = { type, active: true, name: type === 'TRAP' ? 'SPIKE_TRAP' : 'GOBLIN_SQUAD' };
            worldGroup.add(mesh);
            entities.push(mesh);
        }

        addEntity(2, 0, 'ENEMY');
        addEntity(-2, -2, 'TRAP');
        addEntity(0, 3, 'ENEMY');

        // --- COMBAT LOGIC ---
        function triggerEncounter(entity) {
            gameState = 'ENCOUNTER';
            currentEnemy = entity;
            document.getElementById('monster-name').innerText = entity.userData.name;
            document.getElementById('encounter-overlay').style.display = 'flex';
            updateCombatLog(`A ${entity.userData.name} BLOCKS YOUR PATH!`);
        }

        function resolveCombat(action) {
            const roll = Math.floor(Math.random() * 20) + 1;
            if (action === 'ATTACK') {
                const total = roll + strMod;
                if (total >= 12) {
                    updateCombatLog(`SUCCESS! ROLL ${total} CRUSHES FOE.`);
                    setTimeout(victory, 1000);
                } else {
                    takeDamage(3, `FAIL! ROLL ${total} MISSED. FOE STRIKES.`);
                }
            } else { // Dodge
                const total = roll + dexMod;
                if (total >= 10) {
                    updateCombatLog(`DODGED! ROLL ${total} EVADES HARM.`);
                    setTimeout(victory, 800);
                } else {
                    takeDamage(1, `CLUMSY! ROLL ${total}. TAKING MINOR HIT.`);
                }
            }
        }

        function takeDamage(amt, msg) {
            hp -= amt;
            updateCombatLog(msg);
            updateUI();
            if (hp <= 0) {
                gameState = 'GAMEOVER';
                location.reload(); // Simple reset
            }
        }

        function victory() {
            currentEnemy.visible = false;
            currentEnemy.userData.active = false;
            document.getElementById('encounter-overlay').style.display = 'none';
            gameState = 'RUNNING';
            updateLog("FOE VANQUISHED. PROCEED.");
        }

        // --- NAVIGATION ---
        function move(dx, dy) {
            if (gameState !== 'RUNNING') return;
            targetWorldPos.x -= dx;
            targetWorldPos.y -= dy;
            
            // Check for collision after move
            const nextCoord = new THREE.Vector3(-targetWorldPos.x, -targetWorldPos.y, 0);
            entities.forEach(e => {
                if (e.userData.active && e.position.distanceTo(nextCoord) < 0.1) {
                    triggerEncounter(e);
                }
            });
        }

        // --- UI UPDATES ---
        function updateUI() { document.getElementById('hp-bar').innerText = "|".repeat(Math.max(0, hp)); }
        function updateLog(msg) { document.getElementById('log-content').innerHTML = `> ${msg}<br>` + document.getElementById('log-content').innerHTML; }
        function updateCombatLog(msg) { document.getElementById('combat-log').innerText = `> ${msg}`; }

        // --- INPUTS ---
        window.addEventListener('keydown', (e) => {
            if (gameState === 'RUNNING') {
                if (e.code === 'ArrowUp') move(0, 1);
                if (e.code === 'ArrowDown') move(0, -1);
                if (e.code === 'ArrowLeft') move(-1, 0);
                if (e.code === 'ArrowRight') move(1, 0);
            } else if (gameState === 'ENCOUNTER') {
                if (e.code === 'KeyA') resolveCombat('ATTACK');
                if (e.code === 'KeyD') resolveCombat('DODGE');
            }
        });

        document.getElementById('btn-attack').addEventListener('click', () => resolveCombat('ATTACK'));
        document.getElementById('btn-dodge').addEventListener('click', () => resolveCombat('DODGE'));

        // Touch Navigation (Quadrant Tap)
        window.addEventListener('touchstart', (e) => {
            if (gameState !== 'RUNNING') return;
            const x = e.touches[0].clientX / window.innerWidth;
            const y = e.touches[0].clientY / window.innerHeight;
            if (y < 0.3) move(0, 1); else if (y > 0.7) move(0, -1);
            else if (x < 0.3) move(-1, 0); else if (x > 0.7) move(1, 0);
        });

        function animate() {
            requestAnimationFrame(animate);
            worldGroup.position.lerp(targetWorldPos, 0.2);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
